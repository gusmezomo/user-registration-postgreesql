<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Usuários</title>

    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="container">

        <h1>Cadastro de Usuários</h1>

        <form id="formUsuario">

            <label>Nome</label>
            <input
                type="text"
                id="nome"
                required
            >

            <label>Email</label>
            <input
                type="email"
                id="email"
                required
            >

            <label>Senha</label>
            <input
                type="password"
                id="senha"
                required
            >

            <button type="submit">
                Cadastrar
            </button>

        </form>

        <h2>Usuários cadastrados</h2>

        <table>

            <thead>

                <tr>

                    <th>ID</th>
                    <th>Nome</th>
                    <th>Email</th>

                </tr>

            </thead>

            <tbody id="usuariosBody">

            </tbody>

        </table>

    </div>

    <script src="script.js"></script>

</body>

</html>
